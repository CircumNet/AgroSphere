services:
  - type: web
    name: agrosphere-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrosphere-db
          property: connectionString

databases:
  - name: agrosphere-db
    plan: free
    databaseName: agrosphere
    user: agrosphere
